<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <style>
    body { text-align: center; font-family: Arial; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 2em;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<a href="/games.html">Back</a>

<div class="board" id="board"></div>

<h2 id="status">Player X's turn</h2>
<button onclick="resetGame()">Reset</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;

const winConditions = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

function renderBoard() {
  boardEl.innerHTML = "";
  board.forEach((cell, index) => {
    const div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;
    div.onclick = () => makeMove(index);
    boardEl.appendChild(div);
  });
}

function makeMove(index) {
  if (board[index] !== "" || !gameActive) return;

  board[index] = currentPlayer;

  if (checkWin()) {
    statusEl.innerText = "Player " + currentPlayer + " wins!";
    gameActive = false;
  } else if (!board.includes("")) {
    statusEl.innerText = "Draw!";
    gameActive = false;
  } else {
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusEl.innerText = "Player " + currentPlayer + "'s turn";
  }

  renderBoard();
}

function checkWin() {
  return winConditions.some(condition => {
    return condition.every(i => board[i] === currentPlayer);
  });
}

function resetGame() {
  board = ["", "", "", "", "", "", "", "", ""];
  currentPlayer = "X";
  gameActive = true;
  statusEl.innerText = "Player X's turn";
  renderBoard();
}

renderBoard();
</script>

</body>
</html>
